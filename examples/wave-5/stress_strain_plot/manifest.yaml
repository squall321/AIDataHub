name: stress_strain_plot
title: "응력-변형률 곡선 (bilinear hardening)"
description: >-
  재료의 탄성계수 E, 항복 응력, 최대 변형률을 받아 단순 elastic-plastic
  bilinear hardening stress-strain 곡선을 PNG 로 그린다. 결과 PNG 경로와
  주요 수치 (yield strain, max stress) 를 JSON 으로 반환.

script: stress_strain_plot.py
runtime: python
python_version: "3.12"

args:
  - name: material_name
    type: string
    required: true
    description: "표시할 재료 이름 (예: SUS304, Al6061-T6)"
  - name: e_modulus
    type: number
    required: true
    description: "탄성계수 (GPa). 강철 ≈ 200, 알루미늄 ≈ 70."
  - name: yield_stress
    type: number
    required: true
    description: "항복 응력 (MPa). SUS304 ≈ 215, Al6061-T6 ≈ 276."
  - name: ultimate_strain
    type: number
    default: 0.20
    description: "최대 변형률 (0~1, default 0.20 = 20%)."
  - name: out_path
    type: string
    default: "/work/out.png"
    description: "출력 PNG 경로. 컨테이너 내부 /work/ 만 쓰기 가능 — 호스트에 복귀."

timeout_sec: 30
args_style: long_flags
env_allowlist:
  - LANG
  - LC_ALL

return:
  format: json

platform_capability:
  net: false
  gpu: false

resource_limits:
  cpu_percent: 200
  ram_gib: 1
  disk_gib: 1

# wave-5 의 매력 — 도구 출력을 자동으로 records 에 적재.
# 이 도구는 시뮬레이션 결과이므로 data_type=SIM.
# title_template 의 {args.X} placeholder 는 호출 인자, {parsed.Y} 는 stdout JSON 파싱 결과.
persist_output:
  enabled: true
  data_type: SIM
  team: HE
  group: CAE
  title_template: "Stress-Strain — {args.material_name} (E={args.e_modulus}GPa, σy={args.yield_stress}MPa)"
  tags:
    - stress-strain
    - material
    - plot
    - bilinear-hardening
  summary_template: >-
    {args.material_name} 의 elastic-plastic 응력-변형률 곡선. yield strain
    = {parsed.yield_strain}, max stress = {parsed.max_stress_mpa} MPa.
  # 같은 (재료/E/σy/ε_u) 조합의 호출은 새 record 만들지 않고 updated_at 만 갱신.
  # 동일 곡선 100번 호출해도 records 1행만 유지 → 폭주 방지.
  dedup_key: "{args.material_name}_{args.e_modulus}_{args.yield_stress}_{args.ultimate_strain}"

# LLM 라우팅 보조 — recommend_agents 가 이 도구를 적합 후보로 떠올릴 단서.
llm_hints:
  when_to_use: >-
    사용자가 재료의 stress-strain 곡선 / σ-ε 그래프 / 응력-변형률 곡선을
    요청할 때. 단순 elastic-plastic bilinear hardening 가정 시.
  not_for: >-
    유한요소 해석 (FEM), 동적/충돌 하중, 다축 응력 상태, 점성·온도
    의존 거동, 실험 데이터 fitting — 이 도구는 단순 분석적 모델만 그린다.
  example_calls:
    - natural_language: "SUS304 의 stress-strain 곡선 그려줘. yield 215."
      args:
        material_name: "SUS304"
        e_modulus: 200.0
        yield_stress: 215.0
    - natural_language: "Al6061-T6 응력-변형률 그래프 만들어줘. E 69 GPa, σy 276 MPa, 30% strain 까지."
      args:
        material_name: "Al6061-T6"
        e_modulus: 69.0
        yield_stress: 276.0
        ultimate_strain: 0.30
  output_description: >-
    PNG 파일 경로 (out_path) + JSON 메타 (yield_strain, max_stress_mpa).
    persist_output 로 SIM 레코드에 자동 적재되어 추후 시맨틱 검색 노출.
