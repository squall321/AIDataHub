; ===========================================
; AI Data Hub 클라이언트 설정 파일
; ===========================================
; 이 파일을 config.ini 로 복사한 뒤 값을 채워라.
;   1) Windows 탐색기에서 config.example.ini → config.ini 로 복사
;   2) 메모장 또는 VS Code 로 config.ini 열어 아래 값 수정
;   3) setup.bat 더블클릭

[server]
; 통신할 API 서버 주소 (필수)
;   로컬:    http://localhost:8000
;   사내:    http://aidh.intra.example.com:8000
base_url = http://localhost:8000

; X-API-Key (필수, 운영자에게 발급 받아라)
api_key = paste-your-api-key-here

[model]
; 너의 모델 사이즈 (가이드 다운로드 시 사용)
;   tiny   : 1B-3B   (phi-3-mini, smolllm-1.7B, qwen-2.5-1.5B)
;   small  : 3B-7B   (llama-3 8B, qwen-2.5 7B, mistral 7B)
;   medium : 13B-70B (llama-3 70B, qwen-2.5 32B/72B)
;   large  : frontier (Claude Opus, GPT-4o, Gemini)
size = small

[upload]
; ingest.bat 사용 시 기본값 (적재할 자료의 division/team/year)
division = HE
team = CAE
year = 2026
; seq = 0 → MAX+1 자동 부여
seq = 0

[output]
; 가이드 저장 폴더 (이 폴더 기준 상대 경로)
guide_dir = docs
