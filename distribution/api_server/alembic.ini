# Alembic config file.
#
# DATABASE URL is injected by env.py from api.config.settings.database_url.
# Therefore sqlalchemy.url below is left empty.

[alembic]
# Migration script directory
script_location = alembic

# Version filename template: 0001_xxx.py
file_template = %%(rev)s_%%(slug)s

# Prepend src to sys.path (src layout)
prepend_sys_path = src

# Local timezone (Asia/Seoul)
timezone = Asia/Seoul

# DB URL is set dynamically in env.py from settings.
sqlalchemy.url =


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
